name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    name: PowerShell verifier
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 3.4.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -RequiredVersion 3.4.0 -Force

      - name: Run AutoLoop verification
        shell: powershell
        run: |
          $pester = Get-Module -ListAvailable Pester | Where-Object { $_.Version -eq [version]"3.4.0" } | Select-Object -First 1
          if (-not $pester) {
            throw "Pester 3.4.0 is required by the current test suite."
          }

          $moduleRoot = Join-Path $env:RUNNER_TEMP "autoloop-powershell-modules"
          $pesterTarget = Join-Path $moduleRoot "Pester"
          New-Item -ItemType Directory -Force -Path $pesterTarget | Out-Null
          Copy-Item -Path (Join-Path $pester.ModuleBase "*") -Destination $pesterTarget -Recurse -Force
          $env:PSModulePath = "$moduleRoot;$env:PSModulePath"

          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\verify-autoloop.ps1
