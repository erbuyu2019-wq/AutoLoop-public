name: Verify

on:
  push:
  pull_request:

jobs:
  verify:
    name: PowerShell verifier
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 3.4.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -RequiredVersion 3.4.0 -Force

      - name: Run AutoLoop verification
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\verify-autoloop.ps1
